  <script>

    var reload_timer = 60*1*1000;
    var i = null;

    setTimeout(function(){ reloadImages(); }, 100);

    function resetInterval() {

      clearInterval(i);

      i = setInterval(function(){
        reloadImages();
      }, reload_timer);

    }

    function reloadImages() {
      $.each($("img"), function(){
        var e = $(this);
        src = e.attr("src");
        src = src.split("?", 1)[0];
        new_src = src + "?timestamp="  + new Date().getTime();
        e.attr("src", new_src);
        //console.log(src, new_src);
      });
    }

    function loadTimberline() {
        $.getJSON('http://www.whateverorigin.org/get?url=' + encodeURIComponent('http://www.timberlinelodge.com/conditions') + '&callback=?', function(data){
            // var $frame = $("<iframe src='about:blank'/>").hide();
            // var $frame2 = $("<iframe src='about:blank'/>");
            // $frame.appendTo('body');
            // var doc = $frame.get(0).contentWindow.document;
            // //var doc2 = $frame.get(0).contentWindow.document;
            // doc.write(data.contents);
            // var temp = $("#template_7_grid", doc);
            // $("#tline").append(temp).then(function(){
            //
            // });
            // //var $current = $("#template_7_grid", doc2);
            // setTimeout(function() { $frame.remove(); }, 1000);
            //cross platform xml object creation from w3schools

            try //Internet Explorer
            {
                xmlDoc=new ActiveXObject("Microsoft.XMLDOM");
                xmlDoc.async="false";
                xmlDoc.loadXML(data);
            }
            catch(e)
            {
                try // Firefox, Mozilla, Opera, etc.
                {
                    parser=new DOMParser();
                    xmlDoc=parser.parseFromString(data.contents,"text/xml");
                }
                catch(e)
                {
                    alert(e.message);
                    return;
                }
            }

            alert(xmlDoc.getElementsByTagName("title")[0].childNodes[0].nodeValue);

        });
    }

    $(document).ready(function() {
      $("#summit").attr("src", "http://summitskiarea.com/wp-content/uploads/CAM/summit.jpg?timestamp=" + new Date().getTime());



      setTimeout(function(){ $("#images").show(); }, 1500);
      //console.log($("#summit"));

      resetInterval();
      loadTimberline();

    });
  </script>
